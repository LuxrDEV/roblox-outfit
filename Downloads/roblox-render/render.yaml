services:
  - type: web
    name: roblox-outfit-creator
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: roblox-outfits-db
          property: connectionString
    healthCheckPath: /health

databases:
  - name: roblox-outfits-db
    plan: free
